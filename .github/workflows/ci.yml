name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "packwiz-plugin-cache"

      - name: Build plugin package
        run: cargo xtask package

      - name: Prepare release assets
        run: |
          cp target/wasm32-wasip1/release/bundle/manifest.json target/wasm32-wasip1/release/package/packwiz.manifest.json
          cp target/wasm32-wasip1/release/bundle/capabilities.json target/wasm32-wasip1/release/package/packwiz.capabilities.json

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: packwiz-plugin
          path: |
            target/wasm32-wasip1/release/package/packwiz.zip
            target/wasm32-wasip1/release/package/packwiz.manifest.json
            target/wasm32-wasip1/release/package/packwiz.capabilities.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: packwiz-plugin

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            packwiz.zip
            packwiz.manifest.json
            packwiz.capabilities.json
